alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 4000 for 10m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95

  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate

  - name: cost_budget_spike
    severity: P2
    condition: daily_cost_usd > 5 for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike

  - name: quality_degradation
    severity: P1
    condition: quality_score_avg < 0.75 for 15m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#4-quality-degradation